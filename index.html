<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StructCalc — Evaluare Încărcări Structurale</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0f172a; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 1s linear infinite; }

      @media print {
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        @page { size: A4; margin: 18mm 15mm; }
        body { background: #fff !important; color: #000 !important; font-family: "Georgia", "Times New Roman", serif !important; }

        /* hide app chrome */
        body > div > div > div:first-child, /* header */
        body > div > div > div:nth-child(2) /* tabs */ {
          display: none !important;
        }
        .no-print { display: none !important; }

        /* report styling */
        .print-area {
          max-width: 100% !important;
          padding: 0 !important;
        }
        .print-area div[style] {
          background: #fff !important;
          border-color: #ccc !important;
          color: #000 !important;
        }
        .print-area .report-header {
          background: #f5f5f5 !important;
          border: none !important;
          border-bottom: 2px solid #333 !important;
          border-radius: 0 !important;
          padding-bottom: 16px !important;
          margin-bottom: 20px !important;
        }
        .print-area h1 { color: #000 !important; }
        .print-area table { border: 1px solid #999; }
        .print-area th, .print-area td {
          border-bottom: 1px solid #ccc !important;
          color: #000 !important;
          padding: 6px 10px !important;
        }
        .print-area th { color: #333 !important; font-weight: 700 !important; }
        .print-area td[style*="fontWeight: 700"], .print-area td[style*="fontWeight: 800"] {
          color: #000 !important;
        }
        .print-area span, .print-area div, .print-area p, .print-area label, .print-area a {
          color: #000 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
